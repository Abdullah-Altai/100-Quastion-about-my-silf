<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسئلة شخصية 🔒</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  min-height:100vh;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:600px;
  background:#1c1c1c;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

h1{margin-bottom:15px;}

#progress{
  margin-bottom:15px;
  opacity:.7;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:15px;
  font-size:16px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#00c896;
  color:black;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#00ffbf;
}

.result{
  text-align:right;
  max-height:400px;
  overflow:auto;
  margin-top:20px;
}

.q{
  margin-bottom:10px;
  color:#00ffbf;
}

.a{
  margin-bottom:20px;
  padding:10px;
  background:#2a2a2a;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>🔒 أسئلة شخصية</h1>
<div id="progress"></div>

<div id="question"></div>

<input id="answer" placeholder="اكتب إجابتك هنا">

<button onclick="nextQuestion()">التالي</button>

<div id="result" class="result"></div>

</div>

<script>
const questions = [
"شنو أكثر شي تخاف منه؟",
"إذا بقيت وحدك يوم كامل، شتفكر؟",
"شنو أكثر ذكرى مؤثرة بحياتك؟",
"هل تثق بالناس بسهولة؟",
"شنو الشي اللي مستحيل تقوله لأي شخص؟",
"إذا زعلت، شلون تتصرف؟",
"شنو أكثر شي يضايقك من الناس؟",
"تحب تكون وحدك لو ويا ناس؟",
"شنو أكثر قرار ندمت عليه؟",
"شنو الشي اللي يخليك تبچي؟",

"هل تخاف من المستقبل؟",
"شنو أكثر شي تفكر بي قبل النوم؟",
"هل تشوف نفسك قوي نفسياً؟",
"شنو أكثر صفة تحبها بنفسك؟",
"شنو أكثر صفة تكرهها بنفسك؟",
"هل تتأثر بكلام الناس؟",
"شنو موقف غير طريقة تفكيرك؟",
"هل تندم بسرعة؟",
"شنو الشي اللي تخاف تخسره؟",
"تحب تعبر عن مشاعرك؟",

"شنو أكبر حلم عندك؟",
"تحب الماضي لو الحاضر؟",
"هل تحس نفسك مفهوم من الناس؟",
"تحب تكون قائد لو تابع؟",
"شنو الشي اللي يخليك سعيد؟",
"شنو الشي اللي يخليك عصبي؟",
"هل تسامح بسهولة؟",
"شنو أكثر شي يحفزك؟",
"تحب التغيير لو الروتين؟",
"هل تحب المغامرة؟",

"شنو أكثر موقف محرج صارلك؟",
"هل تخاف من الفشل؟",
"هل تعتمد على نفسك؟",
"تحب الوحدة؟",
"شنو الشي اللي تتمنى تغيره بحياتك؟",
"هل تفكر كثير؟",
"شنو أكبر إنجاز سويته؟",
"شنو الشي اللي ممكن تضحي بي؟",
"هل تثق بقراراتك؟",
"شنو أكثر شي يقلقك؟",

"هل تحب المفاجآت؟",
"شنو أكثر شي ما تنساه؟",
"هل تحب تساعد الناس؟",
"شنو أكثر شي يضيع وقتك؟",
"هل عندك صديق مقرب؟",
"شنو الشي اللي تتمناه يصير؟",
"هل تعتبر نفسك صريح؟",
"شنو أكثر شي يزعجك؟",
"هل تحب الحياة؟",
"هل أنت متفائل؟",

"شنو أكثر شي يضحكك؟",
"هل تحب الناس بشكل عام؟",
"شنو أكثر شي تتمناه حالياً؟",
"هل تحب التحدي؟",
"شنو أكثر شي تحب تتعلمه؟",
"هل تحب نفسك؟",
"شنو أكثر شي تحبه بالحياة؟",
"هل تخاف من الوحدة؟",
"شنو أكثر شي تتذكره دائماً؟",
"هل تحب السفر؟",

"شنو أكثر شي يغير مزاجك بسرعة؟",
"هل تحب تبدأ أشياء جديدة؟",
"شنو أكثر شي تعتبره مهم بحياتك؟",
"هل تحب الهدوء؟",
"شنو أكثر شي يخليك تفكر بعمق؟",
"هل تحب العمل الجماعي؟",
"شنو أكثر شي تحب تشتريه؟",
"هل تحب الصراحة لو المجاملة؟",
"شنو أكثر شي تتمنى تغييره بالمجتمع؟",
"هل تحب الحياة البسيطة؟",

"شنو أكثر شي يسعدك يومياً؟",
"هل تحب المغامرات الخطرة؟",
"شنو أكثر شي تخاف تفقده؟",
"هل تعتبر نفسك اجتماعي؟",
"شنو أكثر نشاط تستمتع بي؟",
"هل تحب الالتزام؟",
"شنو أكثر شي يشغلك ذهنياً؟",
"هل تحب التحديات الصعبة؟",
"شنو أكثر شي يجعلك فخور بنفسك؟",
"هل تحب تكون تحت الضغط؟",

"شنو أكثر شي تحب تغيره بشخصيتك؟",
"هل تحب تكون مختلف عن الآخرين؟",
"شنو أكثر شي يجذبك بالناس؟",
"هل تحب التخطيط للمستقبل؟",
"شنو أكثر شي تتعلمه من أخطائك؟",
"هل تحب الروتين اليومي؟",
"شنو أكثر شي تحب تشاركه مع غيرك؟",
"هل تحب العزلة أحياناً؟",
"شنو أكثر شي يعطيك طاقة إيجابية؟",
"هل تحب التفكير العميق؟",

"شنو أكثر شي يسبب لك توتر؟",
"هل تحب التغيير المفاجئ؟",
"شنو أكثر شي تحب تحققه قريباً؟",
"هل تحب الناس اللي يشبهونك؟",
"شنو أكثر شي تعلمته بالحياة؟",
"هل تحب تساعد بدون مقابل؟",
"شنو أكثر شي تخاف تواجهه؟",
"هل تحب تكون صريح دائماً؟",
"شنو أكثر شي يهمك بالمستقبل؟",
"هل تحب نفسك مثل ما أنت؟"
];

let index = 0;
let answers = [];

function showQuestion(){
  document.getElementById("question").innerHTML = questions[index];
  document.getElementById("progress").innerHTML = (index+1) + " / 100";
}

function nextQuestion(){
  const input = document.getElementById("answer");
  const value = input.value.trim();

  if(value === ""){
    alert("اكتب جواب!");
    return;
  }

  answers.push(value);
  input.value = "";

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById("question").style.display = "none";
  document.getElementById("answer").style.display = "none";
  document.querySelector("button").style.display = "none";
  document.getElementById("progress").innerHTML = "✅ انتهيت";

  let html = "";

  for(let i = 0; i < answers.length; i++){
    html += `<div class="q">${questions[i]}</div>`;
    html += `<div class="a">${answers[i]}</div>`;
  }

  document.getElementById("result").innerHTML = html;
}

showQuestion();
</script>

</body>
</html>
